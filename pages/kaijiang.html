<!DOCTYPE html>

    </div>

    <!-- 大乐透开奖 -->
    <div class="lottery-result active" id="daletou">

          <span class="result-issue">第25001期</span>

          <div class="ball-group">
            <span class="ball red">03</span>
            <span class="ball red">12</span>
            <span class="ball red">18</span>
            <span class="ball red">25</span>

          </div>
          <div class="ball-group" style="margin-top: 12px;">
            <span class="ball blue">05</span>

          </div>
        </div>
        <div class="result-info">
          <div class="info-item">
            <span class="info-label">奖池滚存</span>
            <span class="info-value" style="color: var(--primary-red);">12.58亿元</span>
          </div>
          <div class="info-item">
            <span class="info-label">一等奖</span>
            <span class="info-value">3注</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="result-header">
          <span class="result-issue">第25000期</span>
          <span class="result-date">2026-01-13</span>
        </div>
        <div class="result-balls">
          <div class="ball-group">
            <span class="ball red">05</span>
            <span class="ball red">11</span>
            <span class="ball red">19</span>
            <span class="ball red">22</span>
            <span class="ball red">30</span>
          </div>
          <div class="ball-group" style="margin-top: 12px;">
            <span class="ball blue">02</span>
            <span class="ball blue">08</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 排列三开奖 -->
    <div class="lottery-result" id="pailie3" style="display: none;">
      <div class="card">
        <div class="result-header">
          <span class="result-issue">第25001期</span>
          <span class="result-date">2026-01-15</span>
        </div>
        <div class="result-balls">
          <div class="ball-group">
            <span class="ball blue">3</span>
            <span class="ball blue">6</span>
            <span class="ball blue">9</span>
          </div>
        </div>
        <div class="result-info">
          <div class="info-item">
            <span class="info-label">直选中奖</span>
            <span class="info-value">8,520注</span>
          </div>
          <div class="info-item">
            <span class="info-label">单注奖金</span>
            <span class="info-value" style="color: var(--primary-red);">1,040元</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 排列五开奖 -->
    <div class="lottery-result" id="pailie5" style="display: none;">
      <div class="card">
        <div class="result-header">
          <span class="result-issue">第25001期</span>
          <span class="result-date">2026-01-15</span>
        </div>
        <div class="result-balls">
          <div class="ball-group">
            <span class="ball blue">1</span>
            <span class="ball blue">3</span>
            <span class="ball blue">5</span>
            <span class="ball blue">7</span>
            <span class="ball blue">9</span>
          </div>
        </div>
        <div class="result-info">
          <div class="info-item">
            <span class="info-label">一等奖</span>
            <span class="info-value">56注</span>
          </div>
          <div class="info-item">
            <span class="info-label">单注奖金</span>
            <span class="info-value" style="color: var(--primary-red);">100,000元</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 7星彩开奖 -->
    <div class="lottery-result" id="7xing" style="display: none;">
      <div class="card">
        <div class="result-header">
          <span class="result-issue">第25001期</span>
          <span class="result-date">2026-01-15</span>
        </div>
        <div class="result-balls">
          <div class="ball-group">
            <span class="ball red">1</span>
            <span class="ball red">2</span>
            <span class="ball red">3</span>
            <span class="ball red">4</span>
            <span class="ball red">5</span>
            <span class="ball red">6</span>

    <!-- 我的订单 -->
    <div class="card" id="my-orders-section">
      <div class="card-title">我的订单 <span id="order-count" style="font-size: 12px; color: var(--gray-500);">(0)</span></div>
      <div id="my-orders-list">
        <p style="color: var(--gray-400); text-align: center; padding: 20px;">暂无订单，去选号页面投注</p>
      </div>
    </div>

    <!-- 历史查询入口 -->
    <div class="card">
      <div class="card-title">历史开奖</div>
      <div class="history-search">
        <input type="text" placeholder="输入期号查询（如：25001）" class="search-input">
        <button class="btn btn-primary" style="padding: 10px 20px;">查询</button>
      </div>
    </div>
  </main>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="match.html" class="nav-item">
      <span class="nav-icon">⚽</span>
      <span>赛事</span>
    </a>
    <a href="data.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>数据</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="../js/app.js"></script>
  <script>
    // Tab切换
    document.querySelectorAll('.tab-item').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const type = this.dataset.type;
        document.querySelectorAll('.lottery-result').forEach(r => r.style.display = 'none');
        document.getElementById(type).style.display = 'block';
        loadMyOrders();
      });
    });
    
    // 加载我的订单
    function loadMyOrders() {
      const orders = JSON.parse(localStorage.getItem('ticaidian_orders') || '[]');
      const activeTab = document.querySelector('.tab-item.active').dataset.type;
      const filteredOrders = orders.filter(o => o.type === activeTab);
      
      document.getElementById('order-count').textContent = '(' + filteredOrders.length + ')';
      
      if (filteredOrders.length === 0) {
        document.getElementById('my-orders-list').innerHTML = '<p style="color: var(--gray-400); text-align: center; padding: 20px;">暂无订单，去选号页面投注</p>';
        return;
      }
      
      // 获取当前开奖结果
      const currentResult = getCurrentResult(activeTab);
      
      let html = '';
      filteredOrders.slice().reverse().forEach(order => {
        const result = checkWin(order, currentResult);
        const statusClass = result.status === 'win' ? 'win' : (result.status === 'lose' ? 'lose' : 'pending');
        const statusText = result.status === 'win' ? '已中奖' : (result.status === 'lose' ? '未中奖' : '待开奖');
        const winAmount = result.winAmount > 0 ? `<span style="color: var(--primary-red); font-weight: 600;">+¥${result.winAmount}</span>` : '';
        
        html += `
          <div class="order-item ${statusClass}">
            <div class="order-header">
              <span class="order-issue">${order.issue}期</span>
              <span class="order-status">${statusText} ${winAmount}</span>
            </div>
            <div class="order-numbers">
              ${formatOrderNumbers(order)}
            </div>
            <div class="order-info">
              <span>投注¥${order.amount}</span>
              <span>${new Date(order.createTime).toLocaleDateString()}</span>
            </div>
          </div>
        `;
      });
      document.getElementById('my-orders-list').innerHTML = html;
    }
    
    // 获取当前开奖结果
    function getCurrentResult(type) {
      const results = {
        daletou: { front: ['03', '12', '18', '25', '33'], back: ['05', '11'] },
        pailie3: { numbers: ['3', '6', '9'] },
        pailie5: { numbers: ['1', '3', '5', '7', '9'] }
      };
      return results[type] || null;
    }
    
    // 检查中奖
    function checkWin(order, result) {
      if (!result) return { status: 'pending', winAmount: 0 };
      
      if (order.type === 'daletou') {
        const frontMatch = order.front.filter(n => result.front.includes(n)).length;
        const backMatch = order.back.filter(n => result.back.includes(n)).length;
        
        // 大乐透中奖规则
        const winRules = [
          { front: 5, back: 2, prize: 10000000 },
          { front: 5, back: 1, prize: 100000 },
          { front: 5, back: 0, prize: 10000 },
          { front: 4, back: 2, prize: 3000 },
          { front: 4, back: 1, prize: 300 },
          { front: 3, back: 2, prize: 200 },
          { front: 4, back: 0, prize: 100 },
          { front: 3, back: 1, prize: 15 },
          { front: 2, back: 2, prize: 15 },
          { front: 3, back: 0, prize: 5 },
          { front: 1, back: 2, prize: 5 },
          { front: 2, back: 1, prize: 5 },
          { front: 0, back: 2, prize: 5 }
        ];
        
        const rule = winRules.find(r => r.front === frontMatch && r.back === backMatch);
        if (rule) {
          return { status: 'win', winAmount: rule.prize, match: `${frontMatch}+${backMatch}` };
        }
        return { status: 'lose', winAmount: 0 };
      }
      
      if (order.type === 'pailie3') {
        const match = order.numbers.every((n, i) => n === result.numbers[i]);
        if (match) return { status: 'win', winAmount: 1040 };
        return { status: 'lose', winAmount: 0 };
      }
      
      if (order.type === 'pailie5') {
        const match = order.numbers.every((n, i) => n === result.numbers[i]);
        if (match) return { status: 'win', winAmount: 100000 };
        return { status: 'lose', winAmount: 0 };
      }
      
      return { status: 'pending', winAmount: 0 };
    }
    
    // 格式化订单号码
    function formatOrderNumbers(order) {
      if (order.type === 'daletou') {
        let html = '<span style="color: var(--primary-red);">' + order.front.join(' ') + '</span>';
        html += ' + <span style="color: var(--primary-blue);">' + order.back.join(' ') + '</span>';
        return html;
      }
      return order.numbers ? order.numbers.join(' ') : order.description;
    }
    
    // 页面加载时显示订单
    loadMyOrders();
  </script>
  
  <style>
    .tab-nav {
      display: flex;
      background: var(--white);
      margin: 12px 16px;
      border-radius: 8px;
      padding: 4px;
      gap: 4px;
    }
    
    .tab-item {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--gray-600);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab-item.active {
      background: var(--primary-red);
      color: var(--white);
    }
    
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .result-issue {
      font-size: 16px;
      font-weight: 600;
      color: var(--gray-900);
    }
    
    .result-date {
      font-size: 12px;
      color: var(--gray-500);
    }
    
    .result-balls {
      margin-bottom: 16px;
    }
    
    .ball-group {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    
    .ball {
      width: 36px;
      height: 36px;
      line-height: 36px;
      text-align: center;
      border-radius: 50%;
      font-size: 14px;
      font-weight: 600;
    }
    
    .ball.red {
      background: var(--primary-red);
      color: var(--white);
    }
    
    .ball.blue {
      background: var(--primary-blue);
      color: var(--white);
    }
    
    .result-info {
      display: flex;
      justify-content: space-around;
      padding-top: 16px;
      border-top: 1px solid var(--gray-100);
    }
    
    .info-item {
      text-align: center;
    }
    
    .info-label {
      display: block;
      font-size: 12px;
      color: var(--gray-500);
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-800);
    }
    
    .history-search {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    
    .search-input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--gray-300);
      border-radius: 8px;
      font-size: 14px;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--primary-red);
    }
    
    /* 订单样式 */
    .order-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      background: var(--gray-50);
    }
    
    .order-item.win {
      background: #fff3e0;
      border: 1px solid #ffcc80;
    }
    
    .order-item.lose {
      background: var(--gray-50);
      opacity: 0.7;
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .order-issue {
      font-size: 13px;
      color: var(--gray-600);
    }
    
    .order-status {
      font-size: 13px;
      font-weight: 500;
    }
    
    .order-item.win .order-status {
      color: var(--primary-red);
    }
    
    .order-numbers {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    
    .order-info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--gray-500);
    }
  </style>
</body>
</html>
