<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e60012">
  <title>数据中心 - 竞彩门店通</title>
  <link rel="manifest" href="../manifest.json">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" width="28" height="28">
          <circle cx="20" cy="20" r="18" fill="#fff"/>
          <path d="M20 5 L23 15 L33 15 L25 22 L28 32 L20 25 L12 32 L15 22 L7 15 L17 15 Z" fill="#e60012"/>
        </svg>
      </div>
      <span class="header-title">数据中心</span>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 功能入口 -->
    <div class="card">
      <div class="data-grid">
        <a href="zoushi.html" class="data-item">
          <div class="data-icon" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);">📈</div>
          <span class="data-name">走势图</span>
          <span class="data-desc">号码走势分析</span>
        </a>
        <a href="calculator.html" class="data-item">
          <div class="data-icon" style="background: linear-gradient(135deg, #4ecdc4, #44a3aa);">🧮</div>
          <span class="data-name">奖金计算</span>
          <span class="data-desc">投注金额计算</span>
        </a>
        <a href="yilou.html" class="data-item">
          <div class="data-icon" style="background: linear-gradient(135deg, #f9ca24, #f0932b);">📊</div>
          <span class="data-name">遗漏分析</span>
          <span class="data-desc">号码遗漏统计</span>
        </a>
        <a href="jiqiao.html" class="data-item">
          <div class="data-icon" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe);">💡</div>
          <span class="data-name">投注技巧</span>
          <span class="data-desc">选号技巧分享</span>
        </a>
      </div>
    </div>

    <!-- 热门数据 -->
    <div class="card">
      <div class="card-title">热门数据</div>
      <div class="hot-data-list">
        <a href="#" class="hot-item" onclick="showToast('查看详情'); return false;">
          <span class="hot-rank">1</span>
          <span class="hot-name">大乐透近30期热号</span>
          <span class="hot-arrow">›</span>
        </a>
        <a href="#" class="hot-item" onclick="showToast('查看详情'); return false;">
          <span class="hot-rank">2</span>
          <span class="hot-name">排列三和值走势</span>
          <span class="hot-arrow">›</span>
        </a>
        <a href="#" class="hot-item" onclick="showToast('查看详情'); return false;">
          <span class="hot-rank">3</span>
          <span class="hot-name">竞彩足球赔率变化</span>
          <span class="hot-arrow">›</span>
        </a>
        <a href="#" class="hot-item" onclick="showToast('查看详情'); return false;">
          <span class="hot-rank">4</span>
          <span class="hot-name">大乐透后区冷热分析</span>
          <span class="hot-arrow">›</span>
        </a>
      </div>
    </div>

    <!-- 数据工具 -->
    <div class="card">
      <div class="card-title">数据工具</div>
      <div class="tool-list">
        <div class="tool-item">
          <span class="tool-icon">🔢</span>
          <div class="tool-info">
            <span class="tool-name">号码生成器</span>
            <span class="tool-desc">随机生成投注号码</span>
          </div>
          <button class="btn btn-primary" style="padding: 6px 16px; font-size: 12px;" onclick="showToast('功能开发中')">使用</button>
        </div>
        <div class="tool-item">
          <span class="tool-icon">📋</span>
          <div class="tool-info">
            <span class="tool-name">投注记录</span>
            <span class="tool-desc">查看历史投注方案</span>
          </div>
          <button class="btn btn-primary" style="padding: 6px 16px; font-size: 12px;" onclick="showToast('功能开发中')">查看</button>
        </div>
        <div class="tool-item">
          <span class="tool-icon">📊</span>
          <div class="tool-info">
            <span class="tool-name">中奖统计</span>
            <span class="tool-desc">统计中奖情况</span>
          </div>
          <button class="btn btn-primary" style="padding: 6px 16px; font-size: 12px;" onclick="showToast('功能开发中')">查看</button>
        </div>
      </div>
    </div>
  </main>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="../index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="match.html" class="nav-item">
      <span class="nav-icon">⚽</span>
      <span>赛事</span>
    </a>
    <a href="data.html" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span>数据</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="../js/app.js"></script>
  
  <style>
    .data-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .data-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      padding: 20px 12px;
      border-radius: 12px;
      background: var(--gray-50);
      transition: all 0.2s;
    }
    
    .data-item:active {
      background: var(--gray-100);
    }
    
    .data-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    .data-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    
    .data-desc {
      font-size: 12px;
      color: var(--gray-500);
    }
    
    .hot-data-list {
      padding: 8px 0;
    }
    
    .hot-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      text-decoration: none;
      border-bottom: 1px solid var(--gray-100);
    }
    
    .hot-item:last-child {
      border-bottom: none;
    }
    
    .hot-rank {
      width: 24px;
      height: 24px;
      line-height: 24px;
      text-align: center;
      background: var(--primary-red);
      color: var(--white);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 12px;
    }
    
    .hot-name {
      flex: 1;
      font-size: 14px;
      color: var(--gray-700);
    }
    
    .hot-arrow {
      color: var(--gray-400);
      font-size: 18px;
    }
    
    .tool-list {
      padding: 8px 0;
    }
    
    .tool-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    
    .tool-item:last-child {
      border-bottom: none;
    }
    
    .tool-icon {
      font-size: 24px;
      margin-right: 12px;
    }
    
    .tool-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .tool-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-800);
    }
    
    .tool-desc {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 2px;
    }
  </style>
</body>
</html>
